naftiko: 1.0.0-alpha2
info:
  label: Crossref — Licenses
  description: 'Crossref — Licenses. 1 operations. Lead operation: Licenses. Self-contained Naftiko capability covering one
    Crossref business surface.'
  tags:
  - Crossref
  - Licenses
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CROSSREF_API_KEY: CROSSREF_API_KEY
capability:
  consumes:
  - type: http
    namespace: crossref-licenses
    baseUri: ''
    description: Crossref — Licenses business capability. Self-contained, no shared references.
    resources:
    - name: licenses
      path: /licenses
      operations:
      - name: get
        method: GET
        description: Returns a list of licenses.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: Exposes the ability to free text query certain fields
        - name: cursor
          in: query
          type: string
          description: Exposes the ability to deep page through large result sets, where offset would cause performance problems
        - name: rows
          in: query
          type: integer
          description: The number of rows per page
        - name: mailto
          in: query
          type: string
          description: The email address to identify yourself and be in the "polite pool"
        - name: offset
          in: query
          type: integer
          description: The number of rows to skip before returning
  exposes:
  - type: rest
    namespace: crossref-licenses-rest
    port: 8080
    description: REST adapter for Crossref — Licenses. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/licenses
      name: licenses
      description: REST surface for licenses.
      operations:
      - method: GET
        name: get
        description: Returns a list of licenses.
        call: crossref-licenses.get
        with:
          query: rest.query
          cursor: rest.cursor
          rows: rest.rows
          mailto: rest.mailto
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crossref-licenses-mcp
    port: 9090
    transport: http
    description: MCP adapter for Crossref — Licenses. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: returns-list-licenses
      description: Returns a list of licenses.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crossref-licenses.get
      with:
        query: tools.query
        cursor: tools.cursor
        rows: tools.rows
        mailto: tools.mailto
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
