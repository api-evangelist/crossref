        with:
          rows: rest.rows
          order: rest.order
          facet: rest.facet
          sample: rest.sample
          sort: rest.sort
          offset: rest.offset
          mailto: rest.mailto
          select: rest.select
          query: rest.query
          filter: rest.filter
          cursor: rest.cursor
