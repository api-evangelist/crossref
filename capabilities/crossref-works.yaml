naftiko: 1.0.0-alpha2
info:
  label: Crossref — Works
  description: 'Crossref — Works. 8 operations. Lead operation: Works. Self-contained Naftiko capability covering one Crossref
    business surface.'
  tags:
  - Crossref
  - Works
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CROSSREF_API_KEY: CROSSREF_API_KEY
capability:
