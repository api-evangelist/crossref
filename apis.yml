description: >-
  Crossref is a non-profit organization that provides a digital infrastructure for
  scholarly communications. They are best known for their DOI (Digital Object Identifier)
  registration service, which allows researchers and publishers to assign unique identifiers
  to their content, making it easier to cite and locate. Crossref also facilitates
  the linking of related research articles, ensuring that readers have access to a
  network of interconnected knowledge.
