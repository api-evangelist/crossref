aid: crossref
name: Crossref
x-type: company
description: >-
  Crossref is a non-profit organization that provides digital infrastructure
  for scholarly communications. Best known for Digital Object Identifier
  (DOI) registration, Crossref also operates a public REST API offering
  searchable, filterable access to metadata for tens of millions of
  scholarly works, journals, members, funders, prefixes, types, licenses,
  and DOI registration agency information. The Crossref REST API supports
  free-form queries, field queries, filters, facets, deep-paging cursors,
  and selection of specific elements, and is used by reference managers,
  repositories, discovery layers, and analytics platforms.
