apis:
  - aid: crossref:crossref-rest-api
    name: Crossref REST API
    description: >-
      The Crossref REST API is a public, read-only metadata API that
      provides programmatic access to Crossref's database of scholarly
      content. Endpoints expose works, journals, members, funders, types,
      licenses, prefixes, and DOI registration agency lookups, with rich
      query, filter, facet, sort, select, and cursor-based deep paging
      capabilities. No sign-up is required, but consumers are encouraged
      to use the polite pool by including a mailto query parameter or
      User-Agent contact for higher reliability.
    humanURL: https://www.crossref.org/documentation/retrieve-metadata/rest-api/
